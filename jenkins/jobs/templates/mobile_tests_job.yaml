- job-template:
    name: mobile_tests
    project-type: pipeline
    description: "Mobile tests runner"
    concurrent: true
    parameters:
      - string:
          name: REFSPEC
          default: master
          description: "Branch"
      - text:
          name: CONFIG
          default: |
            appium_server_url: http://127.0.0.1
            wiremock_url: http://wiremock:8080/
            jdbc_url: jdbc:postgresql://sql.otus.kartushin.su:5432/wishlist
    pipeline-scm:
      scm:
        - mobile_tests_scm
      script-path: ./jenkins/pipelines/mobile_tests.groovy