- job-template:
    name: runner_job
    project-type: pipeline
    description: "Runner for all tests"
    concurrent: false
    parameters:
      - text:
          name: TESTS_TYPES
          default: |
            ui_tests
            api_tests
    pipeline-scm:
      scm:
        - runner_scm
      script-path: ./jenkins/pipelines/runner_tests.groovy