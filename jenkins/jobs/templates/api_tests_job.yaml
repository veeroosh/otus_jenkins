- job-template:
    name: api_tests
    project-type: pipeline
    description: "API tests runner"
    concurrent: true
    parameters:
      - string:
          name: REFSPEC
          default: master
          description: "Branch"
    pipeline-scm:
      scm:
        - api_tests_scm
      script-path: ./jenkins/pipelines/api_tests.groovy