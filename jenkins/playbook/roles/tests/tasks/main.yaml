---
- name: Running UI tests
  community.docker.docker_container:
    image: "localhost:5005/ui_tests:1.0.1"
    pull: true
    detach: false
    auto_remove: false
    network_mode: host
    volumes:
      - "{{ test_dir }}/allure-results:/tests/allure-results"
    env:
      BROWSER: "{{ browser }}"
      BASE_URL: "{{ base_url }}"
    command: >
      sh -c "mvn clean test -Dbrowser=$BROWSER -DbaseUrl=$BASE_URL -Dallure.results.directory=/tests/allure-results"
    output_logs: true
  register: container_result
  tags: ui_tests

- name: Running API tests
  docker_container:
    command: "-Dbrowser={{ browser_name }}"
    detach: false
    auto_remove: false
    pull: true
    image: "localhost:5005/api_tests:1.0.0"
    network_mode: host
    volumes:
      - "{{ test_dir }}/allure:/root/target/allure-results"
    tags: api_tests
    register: container_result

- name: Running mobile tests
  docker_container:
    command: "-Dbrowser={{ browser_name }}"
    detach: false
    auto_remove: false
    pull: true
    image: "localhost:5005/mobile_tests:1.0.0"
    network_mode: host
    volumes:
      - "{{ test_dir }}/allure:/root/target/allure-results"
    tags: mobile_tests
    register: container_result