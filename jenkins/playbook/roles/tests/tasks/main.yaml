---
- name: Running UI tests
  docker_container:
    detach: false
    auto_remove: false # container will not be removed
    pull: true
    image: "localhost:5005/ui_tests:1.0.1"
    network_mode: host
    volumes:
      - "{{ test_dir }}/allure:/tests/allure-results"
    tags: ui_tests
    register: container_result
    output_logs: true

- name: Running API tests
  docker_container:
    command: "-Dbrowser={{ browser_name }}"
    detach: false
    auto_remove: false
    pull: true
    image: "localhost:5005/api_tests:1.0.0"
    network_mode: host
    volumes:
      - "{{ test_dir }}/allure:/root/target/allure-results"
    tags: api_tests
    register: container_result

- name: Running mobile tests
  docker_container:
    command: "-Dbrowser={{ browser_name }}"
    detach: false
    auto_remove: false
    pull: true
    image: "localhost:5005/mobile_tests:1.0.0"
    network_mode: host
    volumes:
      - "{{ test_dir }}/allure:/root/target/allure-results"
    tags: mobile_tests
    register: container_result