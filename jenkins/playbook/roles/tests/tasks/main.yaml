---
- name: Running UI tests
  community.docker.docker_container:
    name: ui_tests
    image: "localhost:5005/ui_tests:1.0.3"
    pull: true
    detach: false
    auto_remove: false
    network_mode: host
    env:
      BROWSER: "{{ browser }}"
      BASE_URL: "{{ base_url }}"
    output_logs: true
  environment:
    DOCKER_HOST: unix:///var/run/docker.sock
  register: container_result
  tags: ui_tests

- name: Running API tests
  docker_container:
    detach: false
    auto_remove: false
    pull: true
    image: "localhost:5005/api_tests:1.0.0"
    network_mode: host
  tags: api_tests
  register: container_result

- name: Running mobile tests
  docker_container:
    detach: false
    auto_remove: false
    pull: true
    image: "localhost:5005/mobile_tests:1.0.0"
    network_mode: host
    env:
      APPIUM_SERVER_URL: "{{ appium_server_url }}"
      WIREMOCK_URL: "{{ base_url }}"
      JDBC_URL: "{{ jdbc_url }}"
    tags: mobile_tests
    register: container_result